

  <style>
    .overlay{
        background-color: black;
        height: 100%;
        width: 100%;
        position: absolute;
        opacity: 0.5;
        left: 0;
        top: 0;
        z-index: 1;
        display: none;

    }
    .popup{
        z-index: 3;
       position: absolute;
        background-color: white;
        color: black;
        width: 40%;
        padding: 20px;
        left: 30%;
        border-radius: 30px;
        display: none;
    }
  </style>
    <button>show</button>
    <div class="overlay">

    </div>
    <div class="popup">
        <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Quod, nam pariatur. Vero fugiat eius voluptatibus, debitis enim rerum saepe cupiditate.</p>
        <button>close</button>

    </div>

  <script>
       var overlay=document.querySelector(".overlay")
       var popup=document.querySelector(".popup")
       var showBtn = document.querySelector("button")
       
       showBtn.addEventListener("click", function() {
           overlay.style.display = "block"
           popup.style.display = "block"
       })
       
       overlay.addEventListener("click", function() {
           overlay.style.display = "none"
           popup.style.display = "none"
       })
       
       popup.addEventListener("click", function() {
           overlay.style.display = "none"
           popup.style.display = "none"  
       })
  </script>
