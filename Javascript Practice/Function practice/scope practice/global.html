<html>
    <body>
      <h1>Scope</h1>
      <p>Scope access from anywhere in your code</p>
      <p class="demo"></p>
      <p class="demo2"></p>
         <script>
            let xname= "parmid";// Global scope
            myglo()
            function myglo()
            {
                document.querySelector(".demo").innerHTML = "I can dispaly name: " +xname ;
            }
            myfun();
           function myfun(){
            let xage= 27;// Function scope
                document.querySelector(".demo2").innerHTML= "I can display age: "+xage;
           }

           {
            let x= 2; 
           }//x can not be used here or outside
           {
            var x= 2;
           }//x can be used here or outside
           
        </script>
    </body>
</html>
