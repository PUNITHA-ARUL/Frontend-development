<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        const cars= ["Lambo","Toyoto","Thor"]
        // Array method at()
        let car= cars.at(2)
        console.log(car)

        //Array method join()
        let car2= cars.join("^")
        console.log(car2)

        //Pop and Push
        let car3= cars.pop()
        console.log(car3)
        let car4= cars.push()
        console.log(car4)
 
        //shift method
        let car5= cars.shift()
        console.log(car5)

    </script>
</body>
</html>
