<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        const cars= ["Lambo","Toyoto","Thor"]
        // Array method at()
        let car= cars.at(2)
        console.log(car)

        //Array method join()
        let car2= cars.join("^")
        console.log(car2)

        //Pop and Push
        let car3= cars.pop()
        console.log(car3)
        let car4= cars.push("Dragon","Goa")
        console.log(car4)
        
        //shift and unshift method
        let car5= cars.shift()
        console.log(car5)
        let car6= cars.unshift()
        console.log(car6)
        console.log(cars)

        //isarray method
        let car7= Array.isArray(cars)
        console.log(car7)
         
        console.log(delete cars[2])
       
        //concatenation
        let grp1= ["harini","peerithi","balaji"]
        let grp2= ["hevean","jole","sam"]
        //This method does not change the exsiting array
        //merging three array (grp1.concat(grp2,grp3))
        let mygrp= grp1.concat(grp2);
        console.log(mygrp)

        //copywithin() copie the array elements as another position
        let copy= grp1.copyWithin(2,0)
        console.log(copy) 
   
        //flattening()
        let flat= [[1,2],[3,4],[5,6]];
        console.log(flat.flat())
      

    </script>
</body>
</html>
