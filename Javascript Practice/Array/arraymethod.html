<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>

<body>
    <h2>The splice() Method</h2>
    <p> The splice() method adds new elements to an array, and returns an array with the deleted elements</p>

    <p id="demo1"></p>
    <p id="demo2"></p>
    <p id="demo3"></p>
    <script>
        const cars = ["Lambo", "Toyoto", "Thor"]
        // Array method at()
        let car = cars.at(2)
        console.log(car)

        //Array method join()
        let car2 = cars.join("^")
        console.log(car2)

        //Pop and Push
        let car3 = cars.pop()
        console.log(car3)
        let car4 = cars.push("Dragon", "Goa")
        console.log(car4)

        //shift and unshift method
        let car5 = cars.shift()
        console.log(car5)
        let car6 = cars.unshift()
        console.log(car6)
        console.log(cars)

        //isarray method
        let car7 = Array.isArray(cars)
        console.log(car7)

        console.log(delete cars[2])

        //concatenation
        let grp1 = ["harini", "peerithi", "balaji"]
        let grp2 = ["hevean", "jole", "sam"]
        //This method does not change the exsiting array
        //merging three array (grp1.concat(grp2,grp3))
        let mygrp = grp1.concat(grp2);
        console.log(mygrp)

        //copywithin() copie the array elements as another position
        let copy = grp1.copyWithin(2, 0)
        console.log(copy)

        //flattening()
        let flat = [[1, 2], [3, 4], [5, 6]];
        //flat is convert multi-dimensional to one-dimensional array
        console.log(flat.flat())

        //flatmap()
        let flatmap = [1, 3, 5, 7, 8]
        let newflat = flatmap.flatMap(x => [x, x * 5])
        console.log(newflat)

        //splice()
        let arr = ["asus", "hp", "lavone", "mac"]
        let newarr = (2, 0, "aser")
        console.log(newarr)
        //splice dom
        let splice= ["apple","mango","orange"]
       
 
        document.getElementById("demo1").innerHTML= "Origin splice:<br>" +splice;
        //splice() removed the array without holes
        //first parameter as where they new array start 
        //second parameter as where they removed array 
        let newsplice=splice.splice(1,2,"banana","pappaya")
        document.getElementById("demo2").innerHTML= "New splice:<br>" +splice;
        document.getElementById("demo3").innerHTML= "Removed:<br>" + newsplice;

    </script>
</body>

</html>
