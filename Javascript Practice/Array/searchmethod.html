<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        let fruits=["mango","banana","apple","orange"]
        //indexOf()
        let position=fruits.indexOf("banana")+1;
        console.log("Position of fruits: " +position)

        //lastindexOf() same as indexOf()
        let position2= fruits.lastIndexOf("apple")+2;
        console.log("Position of fruits: " +position2)

        //include()allows to check for NaN values
        let position3= fruits.includes("apple")
        console.log("Apple is include: "+ position3)

        //find()
        let position4= [2,4,5,6,8]
        let find= position4.find(myfunction)

        function myfunction(values){
            return values > 6;
        }
        console.log("6 over number is: " + find)

        //findindex()
        let position5=position4.findIndex(myfunction)
        console.log("6 greater number index is: "+position5)

        //lastindex()
        let position6=[30,40,32,28,34,12]
        let last= position6.findLast(x => x > 28)
        console.log("findlast number of 28 than: "+last)

        let last2= position6.findLastIndex(x => x >20)
        console.log(last2)
    </script>
</body>
</html>
