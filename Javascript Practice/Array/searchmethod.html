<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        let fruits=["mango","banana","apple","orange"]
        //indexOf()
        let position=fruits.indexOf("banana")+1;
        console.log("Position of fruits: " +position)

        //lastindexOf() same as indexOf()
        let position2= fruits.lastIndexOf("apple")+2;
        console.log("Position of fruits: " +position2)

        //include()allows to check for NaN values
        let position3= fruits.includes("apple")
        console.log("Apple is include: "+ position3)

        //find()
        let position4= [2,4,5,6,8]
        let find= position4.find(myfunction)

        function myfunction(values){
            return values > 6;
        }
        console.log("6 over number is: " + find)

    </script>
</body>
</html>
