<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="demo"></h1>
    <script>
  
function calculateOrder(hour, price, age, previousOrders) {
  // Apply early bird discount (10% off if hour < 10)
  let total = hour < 10 ? price * 0.9 : price;
  
  // Convert age to days (365 days per year)
  let ageInDays = age * 365;
  
  // Find the Nth prime number where N = previousOrders
  function getNthPrime(n) {
    if (n <= 0) return 0;
    
    let count = 0;
    let num = 2;
    
    while (count < n) {
      if (isPrime(num)) {
        count++;
        if (count === n) {
          return num;
        }
      }
      num++;
    }
    return num;
  }
  
  function isPrime(num) {
    if (num < 2) return false;
    if (num === 2) return true;
    if (num % 2 === 0) return false;
    
    for (let i = 3; i <= Math.sqrt(num); i += 2) {
      if (num % i === 0) return false;
    }
    return true;
  }
  
  let loyaltyTier = getNthPrime(previousOrders);
  
  return {
    total: total,
    ageInDays: ageInDays,
    loyaltyTier: loyaltyTier,
  };
}

const result = calculateOrder(100,20,21,3);
document.getElementById("demo").innerHTML="Total: "+ result.total + ", AgeinDays: " + result.ageInDays + ", Loyaltytier: " + result.loyaltyTier
    </script>
</body>
</html>
