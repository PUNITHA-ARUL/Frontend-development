
<html>
    <body>
        <script>
const fs = require("fs");
const input = fs.readFileSync(0).toString().split('\n');

// Read inputs
const weeklyScreenTime = parseInt(input[0]);
const numBins = parseInt(input[1]);
const pattern = input[2];

// 1. Calculate average daily screen time (round down)
const avgDailyScreenTime = Math.floor(weeklyScreenTime / 7);

// 2. Calculate total storage volume for N cube-shaped bins
let totalVolume = 0;
for (let i = 1; i <= numBins; i++) {
    totalVolume += i * i * i;
}

// 3. Check if pattern alternates perfectly between exactly two different characters
function checkAlternatingPattern(str) {
    if (str.length < 2) {
        return false;
    }
    
    // Get the first two characters
    const char1 = str[0];
    const char2 = str[1];
    
    // They must be different
    if (char1 === char2) {
        return false;
    }
    
    // Check if pattern alternates perfectly
    for (let i = 0; i < str.length; i++) {
        if (i % 2 === 0) {
            // Even positions should have char1
            if (str[i] !== char1) {
                return false;
            }
        } else {
            // Odd positions should have char2
            if (str[i] !== char2) {
                return false;
            }
        }
    }
    
    // Verify that only these two characters exist in the string
    for (let i = 0; i < str.length; i++) {
        if (str[i] !== char1 && str[i] !== char2) {
            return false;
        }
    }
    
    return true;
}

const isAlternating = checkAlternatingPattern(pattern);

// Print results
console.log(avgDailyScreenTime);
console.log(totalVolume);
console.log(isAlternating);
</script>
</body>
</html>
