<html>
    <body>
    <h1>Object Intro</h1>
    <p id="demo"></p>
        <script>
            //create object
            const car = {
                type:'Benz',
                weight:'1000kg',
                color:'Black'
            };

            //you can create an empty object, and add the properties later:
            const bike= {}

            bike.name='discovery'
            bike.model='geer'
            bike.color='gray'

             console.log(bike.color)
            console.log(car.type)

            /*dot notation:
            bike.type;
            barcket botation:
            car.color;*/

            //object methods
            const person= {
                firstname:'Aniruth',
                lastname:'ravichandran',
                age:38,
                fullname: function(){
                    return  'Hello';
                }
                
            };
            // you can change, added, delete the objects
            person.nickname='Ani'
            person.age=34;
            delete person.lastname
            
            console.log(person.fullname())
        document.getElementById("demo").innerHTML=person.firstname + " " + person.lastname + " age is " + person.age + ' and his nickname: '+ person.nickname;
            
           //if check property exists
           let result= ("nickname" in person);
           console.log(result)
        // nested object
        myobj= {
            name:'Ramu',
            age:'20',
            mycar: {
                car1:'bmw',
                car2:'ford',
                car3:'totyoto'
            
            }
        }
        //nested object can access by dot or bracket notation
        console.log(myobj.mycar.car3)
        console.log(myobj["mycar"]["car2"])

        //object display
        //for..in loop
        const shree= {
            type:'stone',color:'gold',boadercol:'yellow'
        };

        let text= ""
        for (let x in shree){
            text += shree[x] + " ";
        };
        console.log(text)

        //object.values()
        const myarray= Object.values(person)
        let txt= myarray.toString();
        console.log(txt);

        //object.entries
        const furit= {mango:200,orange:300,apple:400};

        let show=""
        for(let[furits,value] of Object.entries(furit)){
            show += furit + ": " + value + "<br>";
        }
        //object json stringify
        let json= JSON.stringify(person)
        console.log(json)
        console.log(show)

        // object constrcutor 

        function Person(fisrt,last,age,eyecolor)
        {
            this.firstname=fisrt,
            this.lastname=last,
            this.agenum=age,
            this.eye=eyecolor

        };

        
        </script>
    </body>
</html>
